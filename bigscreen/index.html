<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nanoportal — nagy kijelző</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        pointer-events: none;
        user-select: none;
      }

      .layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        visibility: hidden;
        pointer-events: none;
        overflow: hidden;
      }

      .layer.is-active {
        z-index: 999;
        visibility: visible;
      }

      #layer-photo-img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #051018;
      }

      #layer-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }

      #layer-celebration-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .banner-photo {
        position: absolute;
        height: auto;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        border: 3px solid rgba(255, 255, 255, 0.9);
        transition: opacity 0.3s ease;
      }

      .banner-photo.is-fading {
        opacity: 0;
      }

      .banner-name {
        position: absolute;
        text-align: center;
        font-family: Orbitron, Rajdhani, sans-serif;
        font-weight: 800;
        color: #1a1a1a;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        line-height: 1.1;
        transition: opacity 0.3s ease;
      }

      .banner-name.is-fading {
        opacity: 0;
      }

      #bigscreen-status {
        position: fixed;
        left: 0.75rem;
        bottom: 0.5rem;
        z-index: 1000;
        font-family: "Roboto Mono", ui-monospace, monospace;
        font-size: 0.65rem;
        color: rgba(255, 255, 255, 0.35);
        pointer-events: none;
      }
    </style>
    <script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <script src="/shared/js/mqtt-client.js"></script>
  </head>
  <body>
    <section id="layer-photo" class="layer is-active" aria-hidden="false">
      <img id="layer-photo-img" alt="" />
    </section>

    <section id="layer-video-wrap" class="layer" aria-hidden="true">
      <video id="layer-video" playsinline></video>
    </section>

    <section id="layer-celebration" class="layer" aria-hidden="true">
      <div id="layer-celebration-bg" aria-hidden="true"></div>
      <img id="banner-photo" class="banner-photo" alt="" />
      <p id="banner-name" class="banner-name"></p>
    </section>

    <p id="bigscreen-status" aria-live="polite">MQTT // …</p>

    <script>
      (function () {
        const LAYERS = {
          photo: document.getElementById("layer-photo"),
          video: document.getElementById("layer-video-wrap"),
          celebration: document.getElementById("layer-celebration"),
        };
        const photoImg = document.getElementById("layer-photo-img");
        const videoEl = document.getElementById("layer-video");
        const celebrationBg = document.getElementById("layer-celebration-bg");
        const bannerPhoto = document.getElementById("banner-photo");
        const bannerName = document.getElementById("banner-name");
        const statusEl = document.getElementById("bigscreen-status");

        const TEMPLATES = {
          crowd_europe: {
            background: "/shared/assets/celebration/crowd-europe.png",
            photo: {
              left: "39%",
              top: "24%",
              width: "19%",
              transform: "rotate(-4deg) skewY(-0.5deg)",
            },
            name: {
              left: "34%",
              top: "47%",
              width: "32%",
              transform: "rotate(-4deg)",
              fontSize: "clamp(1.4rem, 3.2vw, 3rem)",
              fontWeight: "800",
              color: "#1a1a1a",
            },
          },
          crowd_nyc: {
            background: "/shared/assets/celebration/crowd-nyc.png",
            photo: {
              left: "41%",
              top: "22%",
              width: "17%",
              transform: "rotate(3deg) skewY(0.5deg)",
            },
            name: {
              left: "36%",
              top: "44%",
              width: "30%",
              transform: "rotate(3deg)",
              fontSize: "clamp(1.4rem, 3.2vw, 3rem)",
              fontWeight: "800",
              color: "#1a1a1a",
            },
          },
        };

        const CELEBRATION_DURATION_MS = 9000;
        const DEFAULT_CHEER = "/shared/assets/audio/ambient_loop_placeholder.mp3";
        const TOPICS = [
          "bigscreen/layer",
          "bigscreen/photo",
          "bigscreen/video",
          "bigscreen/video/play",
          "bigscreen/video/pause",
          "bigscreen/video/reset",
          "bigscreen/players",
          "bigscreen/celebration/background",
          "bigscreen/celebration/cheer",
        ];

        let activeLayer = "photo";
        let players = [];
        let celebrationTemplateId = "crowd_europe";
        let cheerUrl = DEFAULT_CHEER;
        let carouselTimer = null;
        let carouselIndex = 0;
        let cheerAudio = null;
        let mqttClient = null;

        const Mqtt = window.NanoportalMqtt;

        function setStatus(text) {
          if (statusEl) statusEl.textContent = text;
        }

        function resolveImageSrc(raw) {
          const text = String(raw ?? "").trim();
          if (!text) return "";
          if (text.startsWith("data:")) return text;
          if (text.startsWith("http://") || text.startsWith("https://") || text.startsWith("/")) {
            return text;
          }
          return "data:image/jpeg;base64," + text;
        }

        function resolveMediaUrl(raw) {
          const text = String(raw ?? "").trim();
          if (!text) return "";
          if (text.startsWith("http://") || text.startsWith("https://") || text.startsWith("/")) {
            return text;
          }
          return "/shared/assets/video/" + encodeURIComponent(text);
        }

        function resolveCheerUrl(raw) {
          const text = String(raw ?? "").trim();
          if (!text) return DEFAULT_CHEER;
          if (text.startsWith("http://") || text.startsWith("https://") || text.startsWith("/")) {
            return text;
          }
          return "/shared/assets/audio/" + encodeURIComponent(text);
        }

        function normalizeTemplateId(raw) {
          const id = String(raw ?? "").trim().toLowerCase();
          if (id === "crowd_nyc" || id === "nyc") return "crowd_nyc";
          return "crowd_europe";
        }

        function parsePlayersJson(raw) {
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            return [];
          }
          if (!Array.isArray(data)) return [];
          const out = [];
          for (const row of data) {
            if (!row || typeof row !== "object") continue;
            const photo = resolveImageSrc(row.photo ?? row.photo_path ?? "");
            const name = String(row.name ?? row.nickname ?? "").trim();
            if (!photo && !name) continue;
            out.push({ photo, name: name || "VENDÉG" });
          }
          if (out.length < 2) {
            while (out.length < 2 && out.length > 0) {
              out.push({ ...out[0] });
            }
          }
          return out.slice(0, 6);
        }

        function stopCarousel() {
          if (carouselTimer != null) {
            window.clearInterval(carouselTimer);
            carouselTimer = null;
          }
          if (cheerAudio) {
            cheerAudio.pause();
            cheerAudio = null;
          }
          carouselIndex = 0;
        }

        function applyTemplateStyles(template) {
          const photo = template.photo || {};
          const name = template.name || {};
          if (celebrationBg) {
            celebrationBg.style.backgroundImage = "url(" + template.background + ")";
          }
          if (bannerPhoto) {
            bannerPhoto.style.left = photo.left || "38%";
            bannerPhoto.style.top = photo.top || "30%";
            bannerPhoto.style.width = photo.width || "24%";
            bannerPhoto.style.transform = photo.transform || "none";
          }
          if (bannerName) {
            bannerName.style.left = name.left || "36%";
            bannerName.style.top = name.top || "56%";
            bannerName.style.width = name.width || "28%";
            bannerName.style.transform = name.transform || "none";
            bannerName.style.fontSize = name.fontSize || "clamp(1rem, 3vw, 2rem)";
            bannerName.style.fontWeight = name.fontWeight || "800";
            bannerName.style.color = name.color || "#1a1a1a";
          }
        }

        function showCelebrationPlayer(index) {
          const list = players.length
            ? players
            : [{ photo: "", name: "VENDÉG" }];
          const player = list[index % list.length];
          const template = TEMPLATES[celebrationTemplateId] || TEMPLATES.crowd_europe;
          applyTemplateStyles(template);

          const fadeSwap = function () {
            if (bannerPhoto) {
              bannerPhoto.classList.add("is-fading");
              bannerName.classList.add("is-fading");
            }
            window.setTimeout(function () {
              if (bannerPhoto) {
                bannerPhoto.src = player.photo || "/shared/assets/images/poster_placeholder.svg";
                bannerPhoto.alt = player.name;
                bannerPhoto.classList.remove("is-fading");
              }
              if (bannerName) {
                bannerName.textContent = player.name;
                bannerName.classList.remove("is-fading");
              }
            }, 150);
          };

          if (bannerPhoto && bannerPhoto.src) {
            fadeSwap();
          } else {
            if (bannerPhoto) {
              bannerPhoto.src = player.photo || "/shared/assets/images/poster_placeholder.svg";
              bannerPhoto.alt = player.name;
            }
            if (bannerName) bannerName.textContent = player.name;
          }
        }

        function startCheer() {
          if (cheerAudio) {
            cheerAudio.pause();
            cheerAudio = null;
          }
          cheerAudio = new Audio(cheerUrl);
          cheerAudio.loop = true;
          void cheerAudio.play().catch(function () {});
        }

        function startCelebrationCarousel() {
          stopCarousel();
          const list = players.length
            ? players
            : [{ photo: "", name: "VENDÉG" }];
          const perMs = Math.max(1000, Math.floor(CELEBRATION_DURATION_MS / list.length));
          showCelebrationPlayer(0);
          startCheer();
          if (list.length > 1) {
            carouselTimer = window.setInterval(function () {
              carouselIndex = (carouselIndex + 1) % list.length;
              showCelebrationPlayer(carouselIndex);
            }, perMs);
          }
        }

        function resetVideo() {
          if (!videoEl) return;
          videoEl.pause();
          try {
            videoEl.currentTime = 0;
          } catch (_) {}
        }

        function playVideo() {
          if (!videoEl || !videoEl.src) return;
          void videoEl.play().catch(function () {});
        }

        function pauseVideo() {
          if (!videoEl) return;
          videoEl.pause();
        }

        function setPhotoSrc(raw) {
          const src = resolveImageSrc(raw);
          if (photoImg && src) {
            photoImg.src = src;
            photoImg.alt = "Üdvözlő fotó";
          }
        }

        function setVideoSrc(raw) {
          if (!videoEl) return;
          const src = resolveMediaUrl(raw);
          if (!src) return;
          const wasActive = activeLayer === "video";
          resetVideo();
          videoEl.src = src;
          videoEl.load();
          if (wasActive) playVideo();
        }

        function setActiveLayer(name) {
          const next = String(name ?? "").trim().toLowerCase();
          if (next !== "photo" && next !== "video" && next !== "celebration") return;

          if (activeLayer === "video" && next !== "video") {
            resetVideo();
          }
          if (activeLayer === "celebration" && next !== "celebration") {
            stopCarousel();
          }

          activeLayer = next;

          for (const key of Object.keys(LAYERS)) {
            const el = LAYERS[key];
            if (!el) continue;
            const on = key === next;
            el.classList.toggle("is-active", on);
            el.setAttribute("aria-hidden", on ? "false" : "true");
            el.style.zIndex = on ? "999" : "0";
          }

          if (next === "video") {
            playVideo();
          }
          if (next === "celebration") {
            startCelebrationCarousel();
          }

          setStatus("MQTT // " + next.toUpperCase() + " // " + (mqttClient && mqttClient.connected ? "OK" : "…"));
        }

        function handleTopic(topic, text) {
          text = String(text ?? "").trim();
          switch (topic) {
            case "bigscreen/layer":
              setActiveLayer(text);
              break;
            case "bigscreen/photo":
              setPhotoSrc(text);
              break;
            case "bigscreen/video":
              setVideoSrc(text);
              break;
            case "bigscreen/video/play":
              playVideo();
              break;
            case "bigscreen/video/pause":
              pauseVideo();
              break;
            case "bigscreen/video/reset":
              resetVideo();
              break;
            case "bigscreen/players":
              players = parsePlayersJson(text);
              if (activeLayer === "celebration") startCelebrationCarousel();
              break;
            case "bigscreen/celebration/background":
              celebrationTemplateId = normalizeTemplateId(text);
              if (activeLayer === "celebration") showCelebrationPlayer(carouselIndex);
              break;
            case "bigscreen/celebration/cheer":
              cheerUrl = resolveCheerUrl(text);
              if (activeLayer === "celebration") startCheer();
              break;
            default:
              break;
          }
        }

        if (!Mqtt) {
          setStatus("MQTT // ERROR // mqtt-client.js not loaded");
        } else {
          mqttClient = Mqtt.connect({
            topics: TOPICS,
            onMessage: handleTopic,
            onStatus: function (state, detail) {
              switch (state) {
                case "connecting":
                  setStatus("MQTT // CONNECTING // " + detail);
                  break;
                case "connected":
                  setStatus("MQTT // CONNECTED // " + activeLayer.toUpperCase());
                  break;
                case "reconnecting":
                  setStatus("MQTT // RECONNECTING");
                  break;
                case "disconnected":
                  setStatus("MQTT // DISCONNECTED");
                  break;
                case "error":
                  setStatus("MQTT // ERROR // " + detail);
                  break;
                default:
                  break;
              }
            },
          });
        }
      })();
    </script>
  </body>
</html>
