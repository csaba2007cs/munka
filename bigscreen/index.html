<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nanoportal — nagy kijelző</title>
    <link rel="stylesheet" href="/shared/css/theme.css" />
    <link rel="stylesheet" href="/shared/css/components.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--void-900);
        pointer-events: none;
        user-select: none;
      }

      /* ponytail: kiosk full-bleed, no HUD grid from theme.css */
      body::before {
        display: none;
      }

      .layer {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 0;
        overflow: hidden;
        background: var(--void-900);
      }

      .layer.is-active {
        display: block;
        z-index: 1;
      }

      #layer-photo-img,
      #layer-video-el,
      #layer-video-mjpeg {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: var(--void-900);
      }

      #layer-video-mjpeg {
        position: absolute;
        inset: 0;
      }

      #layer-video-el[hidden],
      #layer-video-mjpeg[hidden] {
        display: none !important;
      }

      #layer-celebration {
        --cycle-duration: 3s;
      }

      .celebration-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .celebration-bg[hidden] {
        display: none !important;
      }

      .celebration-slot {
        position: absolute;
        inset: 0;
      }

      .celebration-slot[hidden] {
        display: none !important;
      }

      .celebration-player {
        position: absolute;
        inset: 0;
        opacity: 0;
        animation: player-show var(--cycle-duration) linear infinite;
      }

      .celebration-player.is-paused {
        animation: none;
        opacity: 0;
      }

      @keyframes player-show {
        0% {
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        85% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      .celebration-photo {
        position: absolute;
        display: block;
        height: auto;
        aspect-ratio: 3 / 4;
        object-fit: cover;
      }

      .celebration-name {
        position: absolute;
        margin: 0;
        text-align: center;
        font-family: var(--font-display);
        font-size: clamp(1.4rem, 3.2vw, 3rem);
        font-weight: 700;
        color: var(--cyan-400);
        text-transform: uppercase;
        letter-spacing: var(--tracking-hud);
        line-height: 1.1;
      }

      #mqtt-status {
        position: fixed;
        right: var(--space-3);
        bottom: var(--space-2);
        z-index: 1000;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        opacity: 0.5;
        color: var(--text-muted);
        pointer-events: none;
      }

      #mqtt-status.is-connected {
        color: var(--cyan-400);
      }

      #mqtt-status.is-error {
        color: var(--danger);
      }
    </style>
    <script src="/shared/js/media-url.js"></script>
    <script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <script src="/shared/js/mqtt-client.js"></script>
  </head>
  <body>
    <section id="layer-photo" class="layer is-active" aria-hidden="false">
      <img id="layer-photo-img" alt="" />
    </section>

    <section id="layer-video" class="layer" aria-hidden="true">
      <video id="layer-video-el" autoplay loop muted playsinline></video>
      <img id="layer-video-mjpeg" alt="" hidden />
    </section>

    <section id="layer-celebration" class="layer" aria-hidden="true">
      <img id="celebration-bg" class="celebration-bg" alt="" hidden />
      <div id="celebration-slot" class="celebration-slot" hidden>
        <div id="celebration-player" class="celebration-player is-paused">
          <img id="celebration-photo" class="celebration-photo" alt="" />
          <p id="celebration-name" class="celebration-name"></p>
        </div>
      </div>
    </section>

    <div id="mqtt-status" aria-live="polite">●</div>

    <script>
      (function () {
        const LAYERS = {
          photo: document.getElementById("layer-photo"),
          video: document.getElementById("layer-video"),
          celebration: document.getElementById("layer-celebration"),
        };
        const photoImg = document.getElementById("layer-photo-img");
        const videoEl = document.getElementById("layer-video-el");
        const mjpegEl = document.getElementById("layer-video-mjpeg");
        const statusEl = document.getElementById("mqtt-status");
        const celebrationLayer = document.getElementById("layer-celebration");
        const celebrationBg = document.getElementById("celebration-bg");
        const celebrationSlot = document.getElementById("celebration-slot");
        const celebrationPlayer = document.getElementById("celebration-player");
        const celebrationPhoto = document.getElementById("celebration-photo");
        const celebrationName = document.getElementById("celebration-name");

        const TOPICS = [
          "bigscreen/layer",
          "bigscreen/photo",
          "bigscreen/video",
          "bigscreen/video/play",
          "bigscreen/video/pause",
          "bigscreen/video/reset",
          "bigscreen/players",
          "bigscreen/celebration/background",
          "bigscreen/celebration/cheer",
        ];

        const CELEBRATION_TOTAL_SEC = 9;
        const PHOTO_PLACEHOLDER = "/shared/assets/images/poster_placeholder.svg";

        const TEMPLATES = {
          crowd_europe: {
            photo: { left: "39%", top: "24%", width: "19%" },
            name: { left: "34%", top: "47%", width: "32%" },
          },
          crowd_nyc: {
            photo: { left: "41%", top: "22%", width: "17%" },
            name: { left: "36%", top: "44%", width: "30%" },
          },
        };

        let activeLayer = "photo";
        let players = [];
        let backgroundId = "";
        let cheerUrl = "";
        let carouselIndex = 0;
        let cheerAudio = null;
        let cheerStarted = false;

        const Mqtt = window.NanoportalMqtt;

        function setMqttStatus(state) {
          if (!statusEl) return;
          statusEl.classList.remove("is-connected", "is-error");
          if (state === "connected") statusEl.classList.add("is-connected");
          else if (state === "error") statusEl.classList.add("is-error");
        }

        function resolveImageSrc(raw) {
          const text = String(raw ?? "").trim();
          if (!text) return "";
          if (text.startsWith("data:")) return text;
          if (text.startsWith("http://") || text.startsWith("https://") || text.startsWith("/")) {
            return text;
          }
          return "data:image/jpeg;base64," + text;
        }

        function resolveVideoUrl(raw) {
          const t = String(raw ?? "").trim();
          if (!t) return "";
          if (/^https?:\/\//.test(t) || t.startsWith("/")) return t;
          return "/shared/assets/video/" + encodeURIComponent(t);
        }

        function normalizeBackgroundId(raw) {
          const id = String(raw ?? "").trim().toLowerCase();
          if (!id) return "";
          if (id === "crowd_nyc" || id === "nyc") return "crowd_nyc";
          return "crowd_europe";
        }

        function resolveBackgroundSrc(id) {
          if (!id) return "";
          return "/shared/assets/images/" + id + ".jpg";
        }

        function fallbackBackgroundSrc(id) {
          if (id === "crowd_nyc") return "/shared/assets/celebration/crowd-nyc.png";
          return "/shared/assets/celebration/crowd-europe.png";
        }

        function resolveCheerUrl(raw) {
          const text = String(raw ?? "").trim();
          if (!text) return "";
          if (text.startsWith("http://") || text.startsWith("https://") || text.startsWith("/")) {
            return text;
          }
          return "/shared/assets/audio/" + encodeURIComponent(text);
        }

        function parsePlayersJson(raw) {
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            return [];
          }
          if (!Array.isArray(data)) return [];
          const out = [];
          for (const row of data) {
            if (!row || typeof row !== "object") continue;
            const photo = resolveImageSrc(row.photo ?? row.photo_path ?? "");
            const name = String(row.name ?? row.nickname ?? "").trim();
            if (!photo && !name) continue;
            out.push({ photo, name: name || "VENDÉG" });
          }
          return out.slice(0, 6);
        }

        function activeTemplateId() {
          return backgroundId === "crowd_nyc" ? "crowd_nyc" : "crowd_europe";
        }

        function applyTemplateLayout() {
          const template = TEMPLATES[activeTemplateId()] || TEMPLATES.crowd_europe;
          const photo = template.photo || {};
          const name = template.name || {};
          if (celebrationPhoto) {
            celebrationPhoto.style.left = photo.left || "38%";
            celebrationPhoto.style.top = photo.top || "24%";
            celebrationPhoto.style.width = photo.width || "20%";
          }
          if (celebrationName) {
            celebrationName.style.left = name.left || "34%";
            celebrationName.style.top = name.top || "47%";
            celebrationName.style.width = name.width || "32%";
          }
        }

        function randomTransform(el) {
          if (!el) return;
          const rotate = (Math.random() * 8 - 4).toFixed(1);
          const scale = (0.95 + Math.random() * 0.1).toFixed(2);
          el.style.transform = "rotate(" + rotate + "deg) scale(" + scale + ")";
        }

        function showPlayer(index) {
          if (!players.length || !celebrationPhoto || !celebrationName) return;
          const player = players[index % players.length];
          celebrationPhoto.src = player.photo || PHOTO_PLACEHOLDER;
          celebrationPhoto.alt = player.name;
          celebrationPhoto.onerror = function () {
            celebrationPhoto.onerror = null;
            celebrationPhoto.src = PHOTO_PLACEHOLDER;
          };
          celebrationName.textContent = player.name;
        }

        function stopCheer() {
          if (cheerAudio) {
            cheerAudio.pause();
            cheerAudio = null;
          }
          cheerStarted = false;
        }

        function startCheer() {
          stopCheer();
          if (!cheerUrl) return;
          cheerAudio = new Audio(cheerUrl);
          cheerAudio.loop = true;
          cheerStarted = true;
          cheerAudio.play().catch(function () {});
        }

        function updateBackground() {
          if (!celebrationBg) return;
          if (!backgroundId) {
            celebrationBg.hidden = true;
            celebrationBg.removeAttribute("src");
            return;
          }
          celebrationBg.hidden = false;
          celebrationBg.src = resolveBackgroundSrc(backgroundId);
          celebrationBg.onerror = function () {
            celebrationBg.onerror = null;
            celebrationBg.src = fallbackBackgroundSrc(backgroundId);
          };
        }

        function pausePlayerAnimation() {
          if (!celebrationPlayer) return;
          celebrationPlayer.classList.add("is-paused");
        }

        function resumePlayerAnimation() {
          if (!celebrationPlayer) return;
          celebrationPlayer.classList.remove("is-paused");
          celebrationPlayer.style.animation = "none";
          void celebrationPlayer.offsetHeight;
          celebrationPlayer.style.animation = "";
        }

        function stopCelebration() {
          pausePlayerAnimation();
          stopCheer();
          carouselIndex = 0;
          if (celebrationSlot) celebrationSlot.hidden = true;
        }

        function rebuildCelebration() {
          stopCelebration();
          if (!players.length) {
            if (celebrationBg) celebrationBg.hidden = true;
            return;
          }

          updateBackground();
          applyTemplateLayout();

          const cycleSec = (CELEBRATION_TOTAL_SEC / players.length).toFixed(2);
          if (celebrationLayer) {
            celebrationLayer.style.setProperty("--cycle-duration", cycleSec + "s");
          }

          carouselIndex = 0;
          showPlayer(0);
          randomTransform(celebrationPlayer);

          if (celebrationSlot) celebrationSlot.hidden = false;
          resumePlayerAnimation();
        }

        function startCelebration() {
          if (!players.length) {
            stopCelebration();
            if (celebrationBg) celebrationBg.hidden = true;
            return;
          }
          rebuildCelebration();
        }

        function onPlayerAnimationStart(e) {
          if (!e || e.animationName !== "player-show") return;
          if (!players.length) return;
          if (!cheerStarted) startCheer();
        }

        function onPlayerAnimationIteration(e) {
          if (!e || e.animationName !== "player-show") return;
          if (!players.length) return;
          carouselIndex = (carouselIndex + 1) % players.length;
          showPlayer(carouselIndex);
          randomTransform(celebrationPlayer);
        }

        if (celebrationPlayer) {
          celebrationPlayer.addEventListener("animationstart", onPlayerAnimationStart);
          celebrationPlayer.addEventListener("animationiteration", onPlayerAnimationIteration);
        }

        function isMjpegUrl(url) {
          return window.NanoportalMediaUrl && window.NanoportalMediaUrl.isMjpegUrl(url);
        }

        function resetVideo() {
          if (!videoEl) return;
          videoEl.pause();
          try {
            videoEl.currentTime = 0;
          } catch (_) {}
        }

        function playVideo() {
          if (mjpegEl && !mjpegEl.hidden) return;
          if (!videoEl || !videoEl.src) return;
          const p = videoEl.play();
          if (p && typeof p.catch === "function") {
            p.catch(function () {});
          }
        }

        function pauseVideo() {
          if (videoEl) videoEl.pause();
        }

        function setPhotoSrc(raw) {
          const src = resolveImageSrc(raw);
          if (!photoImg) return;
          if (!src) {
            photoImg.removeAttribute("src");
            photoImg.alt = "";
            return;
          }
          photoImg.src = src;
          photoImg.alt = "Üdvözlő fotó";
        }

        function setVideoSrc(raw) {
          const src = resolveVideoUrl(raw);
          if (!src) {
            if (videoEl) {
              videoEl.pause();
              videoEl.removeAttribute("src");
              videoEl.hidden = false;
            }
            if (mjpegEl) {
              mjpegEl.hidden = true;
              mjpegEl.removeAttribute("src");
            }
            return;
          }
          const wasActive = activeLayer === "video";
          resetVideo();
          if (isMjpegUrl(src)) {
            if (videoEl) {
              videoEl.hidden = true;
              videoEl.removeAttribute("src");
            }
            if (mjpegEl) {
              mjpegEl.hidden = false;
              mjpegEl.src = src + (src.includes("?") ? "&" : "?") + "_t=" + Date.now();
            }
          } else {
            if (mjpegEl) {
              mjpegEl.hidden = true;
              mjpegEl.removeAttribute("src");
            }
            if (videoEl) {
              videoEl.hidden = false;
              videoEl.src = src;
              videoEl.load();
            }
            if (wasActive) playVideo();
          }
        }

        function setActiveLayer(name) {
          const next = String(name ?? "").trim().toLowerCase();
          if (next !== "photo" && next !== "video" && next !== "celebration") return;

          if (activeLayer === "video" && next !== "video") {
            resetVideo();
          }
          if (activeLayer === "celebration" && next !== "celebration") {
            stopCelebration();
          }

          activeLayer = next;

          for (const key of Object.keys(LAYERS)) {
            const el = LAYERS[key];
            if (!el) continue;
            const on = key === next;
            el.classList.toggle("is-active", on);
            el.setAttribute("aria-hidden", on ? "false" : "true");
          }

          if (next === "video") playVideo();
          if (next === "celebration") startCelebration();
        }

        function handleTopic(topic, text) {
          text = String(text ?? "").trim();
          switch (topic) {
            case "bigscreen/layer":
              setActiveLayer(text);
              break;
            case "bigscreen/photo":
              setPhotoSrc(text);
              break;
            case "bigscreen/video":
              setVideoSrc(text);
              break;
            case "bigscreen/video/play":
              playVideo();
              break;
            case "bigscreen/video/pause":
              pauseVideo();
              break;
            case "bigscreen/video/reset":
              resetVideo();
              break;
            case "bigscreen/players":
              players = parsePlayersJson(text);
              if (activeLayer === "celebration") rebuildCelebration();
              break;
            case "bigscreen/celebration/background":
              backgroundId = normalizeBackgroundId(text);
              updateBackground();
              if (activeLayer === "celebration" && players.length) {
                applyTemplateLayout();
              }
              break;
            case "bigscreen/celebration/cheer":
              cheerUrl = resolveCheerUrl(text);
              if (activeLayer === "celebration" && players.length && cheerStarted) {
                startCheer();
              }
              break;
            default:
              break;
          }
        }

        if (!Mqtt) {
          setMqttStatus("error");
        } else {
          Mqtt.connect({
            topics: TOPICS,
            onMessage: handleTopic,
            onStatus: function (state) {
              setMqttStatus(state === "connected" ? "connected" : state === "error" ? "error" : "");
            },
          });
        }
      })();
    </script>
  </body>
</html>
