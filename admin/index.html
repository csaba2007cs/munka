<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nanoportal — operátor</title>
    <link rel="stylesheet" href="/shared/css/theme.css" />
    <link rel="stylesheet" href="/shared/css/components.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      body::before {
        display: none;
      }

      .admin-shell {
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: var(--void-900);
        color: var(--text-primary);
        touch-action: manipulation;
      }

      .admin-header {
        flex-shrink: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        border-bottom: var(--border-width) solid var(--panel-border);
        background: color-mix(in srgb, var(--void-850) 92%, transparent);
      }

      .admin-title {
        margin: 0;
        font-family: var(--font-display);
        font-size: var(--text-lg);
        letter-spacing: var(--tracking-hud);
        color: var(--cyan-400);
        text-transform: uppercase;
      }

      .admin-header-mqtt {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: var(--space-3);
        min-width: 0;
      }

      #mqtt-status {
        margin: 0;
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        color: var(--text-muted);
      }

      #mqtt-status.is-connected {
        color: var(--cyan-400);
      }

      #mqtt-status.is-error {
        color: var(--danger);
      }

      #broker-url {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--text-muted);
        max-width: 14rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .admin-grid {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 1fr 1.5fr 1.5fr;
        gap: var(--space-4);
        padding: var(--space-4);
      }

      @media (max-width: 900px) {
        .admin-grid {
          grid-template-columns: 1fr;
          overflow-y: auto;
        }
      }

      .admin-col {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        min-height: 0;
      }

      .admin-col-title {
        margin: 0;
        font-family: var(--font-display);
        font-size: var(--text-sm);
        letter-spacing: var(--tracking-hud);
        color: var(--cyan-300);
        text-transform: uppercase;
      }

      .btn-stack {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        flex: 1;
      }

      .btn-op {
        appearance: none;
        width: 100%;
        min-height: 56px;
        padding: var(--space-4);
        border-radius: var(--radius-md);
        border: var(--border-width) solid color-mix(in srgb, var(--cyan-400) 45%, transparent);
        background: color-mix(in srgb, var(--void-800) 70%, transparent);
        color: var(--text-primary);
        font-family: var(--font-display);
        font-size: var(--text-md);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        touch-action: manipulation;
      }

      .btn-op:active:not(:disabled) {
        transform: translateY(1px);
        border-color: var(--cyan-400);
      }

      .btn-op:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-op.is-layer-active {
        background: var(--cyan-400);
        color: var(--void-900);
        border-color: var(--cyan-400);
      }

      .btn-op.btn-session-start {
        border-color: color-mix(in srgb, var(--success) 55%, transparent);
        background: color-mix(in srgb, var(--success) 12%, transparent);
      }

      .btn-op.btn-session-pause {
        border-color: color-mix(in srgb, var(--cyan-400) 55%, transparent);
      }

      .btn-op.btn-session-reset,
      .btn-op.btn-session-complete {
        border-color: color-mix(in srgb, var(--danger) 45%, transparent);
      }

      .btn-broker {
        min-height: 44px;
        padding: var(--space-2) var(--space-3);
        font-size: var(--text-xs);
      }

      .quiz-result-bar {
        flex-shrink: 0;
        background: var(--void-700);
        color: var(--text-primary);
        padding: var(--space-3) var(--space-4);
        border-top: var(--border-width) solid var(--panel-border);
      }

      #quiz-result-line {
        margin: 0;
        font-family: var(--font-mono);
        font-size: var(--text-md);
      }
    </style>
    <script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <script src="/shared/js/mqtt-client.js"></script>
  </head>
  <body class="admin-shell">
    <header class="admin-header">
      <h1 class="admin-title">Nanoportal operátor</h1>
      <div class="admin-header-mqtt">
        <p id="mqtt-status" role="status">○ MQTT: kapcsolódás...</p>
        <button type="button" id="btn-broker" class="btn-neon btn-broker">BROKER?</button>
        <span id="broker-url" aria-hidden="true"></span>
      </div>
    </header>

    <main class="admin-grid">
      <section class="admin-col" id="col-controls" aria-labelledby="title-controls">
        <h2 class="admin-col-title" id="title-controls">Vezérlés</h2>
        <div class="btn-stack">
          <button type="button" class="btn-op btn-session-start" id="btn-session-start" disabled>
            Indítás
          </button>
          <button type="button" class="btn-op btn-session-pause" id="btn-session-pause" disabled>
            Szünet
          </button>
          <button type="button" class="btn-op btn-session-reset" id="btn-session-reset" disabled>
            Reset
          </button>
          <button type="button" class="btn-op btn-session-complete" id="btn-session-complete" disabled>
            Lezárás
          </button>
        </div>
      </section>

      <section class="admin-col" id="col-bigscreen" aria-labelledby="title-bigscreen">
        <h2 class="admin-col-title" id="title-bigscreen">Bigscreen</h2>
        <div class="btn-stack">
          <button
            type="button"
            class="btn-op"
            data-publish-layer="bigscreen/layer"
            data-layer="photo"
            disabled
          >
            Ablak kép
          </button>
          <button
            type="button"
            class="btn-op"
            data-publish-layer="bigscreen/layer"
            data-layer="video"
            disabled
          >
            Videó
          </button>
          <button
            type="button"
            class="btn-op"
            data-publish-layer="bigscreen/layer"
            data-layer="celebration"
            disabled
          >
            Gratulálás
          </button>
        </div>
      </section>

      <section class="admin-col" id="col-smallscreen" aria-labelledby="title-smallscreen">
        <h2 class="admin-col-title" id="title-smallscreen">Smallscreen</h2>
        <div class="btn-stack">
          <button
            type="button"
            class="btn-op"
            data-publish-layer="smallscreen/layer"
            data-layer="photo"
            disabled
          >
            Statikus kép
          </button>
          <button
            type="button"
            class="btn-op"
            data-publish-layer="smallscreen/layer"
            data-layer="video"
            disabled
          >
            Videó
          </button>
          <button
            type="button"
            class="btn-op"
            data-publish-layer="smallscreen/layer"
            data-layer="quiz"
            disabled
          >
            Kvíz
          </button>
        </div>
      </section>
    </main>

    <footer class="quiz-result-bar">
      <p id="quiz-result-line" aria-live="polite">Kvíz eredmény: —</p>
    </footer>

    <script>
      (function () {
        /* LEGACY: state.php admin — megtartva referenciának, lásd admin/admin.js */

        const ADMIN_TOPICS = [
          "smallscreen/quiz/result",
          "bigscreen/layer",
          "smallscreen/layer",
        ];

        const Mqtt = window.NanoportalMqtt;
        let mqttClient = null;
        let mqttConnected = false;
        let activeBigLayer = "";
        let activeSmallLayer = "";

        const mqttStatusEl = document.getElementById("mqtt-status");
        const quizResultLineEl = document.getElementById("quiz-result-line");
        const brokerUrlEl = document.getElementById("broker-url");
        const btnBroker = document.getElementById("btn-broker");

        function setMqttStatus(state) {
          if (!mqttStatusEl) return;
          mqttStatusEl.classList.remove("is-connected", "is-error");
          if (state === "connected") {
            mqttStatusEl.textContent = "● MQTT: csatlakozva";
            mqttStatusEl.classList.add("is-connected");
          } else if (state === "connecting") {
            mqttStatusEl.textContent = "○ MQTT: kapcsolódás...";
          } else {
            mqttStatusEl.textContent = "✕ MQTT: hiba";
            mqttStatusEl.classList.add("is-error");
          }
        }

        function updateBrokerLabel() {
          if (!brokerUrlEl || !Mqtt) return;
          brokerUrlEl.textContent = Mqtt.brokerUrl();
        }

        function updatePublishButtons() {
          const disabled = !mqttConnected;
          document
            .querySelectorAll(
              "button[data-publish-layer], #btn-session-start, #btn-session-pause, #btn-session-reset, #btn-session-complete",
            )
            .forEach(function (btn) {
              btn.disabled = disabled;
            });
        }

        function syncLayerButtons(screen) {
          const topic = screen === "bigscreen" ? "bigscreen/layer" : "smallscreen/layer";
          const active = screen === "bigscreen" ? activeBigLayer : activeSmallLayer;
          document.querySelectorAll('[data-publish-layer="' + topic + '"]').forEach(function (btn) {
            const layer = String(btn.getAttribute("data-layer") ?? "").toLowerCase();
            btn.classList.toggle("is-layer-active", layer === active);
          });
        }

        function setQuizResultLine(score, total) {
          if (!quizResultLineEl) return;
          if (!Number.isFinite(score) || !Number.isFinite(total)) {
            quizResultLineEl.textContent = "Kvíz eredmény: —";
            return;
          }
          quizResultLineEl.textContent =
            "Kvíz eredmény: " + score + " / " + total + " helyes";
        }

        function handleAdminMqttMessage(topic, text) {
          const t = String(text ?? "").trim().toLowerCase();
          if (topic === "bigscreen/layer") {
            activeBigLayer = t;
            syncLayerButtons("bigscreen");
            return;
          }
          if (topic === "smallscreen/layer") {
            activeSmallLayer = t;
            syncLayerButtons("smallscreen");
            return;
          }
          if (topic !== "smallscreen/quiz/result") return;
          try {
            const data = JSON.parse(text);
            setQuizResultLine(Number(data.score), Number(data.total));
          } catch (_) {}
        }

        function publish(topic, payload) {
          if (!mqttClient || !mqttConnected || !Mqtt) {
            return Promise.reject(new Error("MQTT nincs csatlakozva."));
          }
          return Mqtt.publish(mqttClient, topic, payload);
        }

        document.getElementById("btn-session-start").addEventListener("click", function () {
          publish("session/control", "start").catch(function () {});
        });
        document.getElementById("btn-session-pause").addEventListener("click", function () {
          publish("session/control", "pause").catch(function () {});
        });
        document.getElementById("btn-session-reset").addEventListener("click", function () {
          publish("session/control", "reset").catch(function () {});
        });
        document.getElementById("btn-session-complete").addEventListener("click", function () {
          publish("session/control", "complete").catch(function () {});
        });

        document.querySelectorAll("[data-publish-layer]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            const topic = btn.getAttribute("data-publish-layer");
            const layer = btn.getAttribute("data-layer");
            if (!topic || !layer) return;
            publish(topic, layer).catch(function () {});
          });
        });

        if (btnBroker) {
          btnBroker.addEventListener("click", function () {
            if (!Mqtt) return;
            const cur = Mqtt.brokerUrl();
            const url = window.prompt("MQTT broker URL:", cur);
            if (!url || !String(url).trim()) return;
            try {
              localStorage.setItem(Mqtt.LS_BROKER_KEY, String(url).trim());
            } catch (_) {}
            location.reload();
          });
        }

        updateBrokerLabel();
        setQuizResultLine(null, null);

        if (!Mqtt) {
          setMqttStatus("error");
        } else {
          mqttClient = Mqtt.connect({
            topics: ADMIN_TOPICS,
            onMessage: handleAdminMqttMessage,
            onStatus: function (state) {
              if (state === "connected") {
                mqttConnected = true;
                setMqttStatus("connected");
              } else if (state === "connecting" || state === "reconnecting") {
                mqttConnected = false;
                setMqttStatus("connecting");
              } else {
                mqttConnected = false;
                setMqttStatus("error");
              }
              updatePublishButtons();
            },
          });
        }
      })();
    </script>
  </body>
</html>
