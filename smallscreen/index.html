<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nanoportal — érintőképernyő</title>
    <link rel="stylesheet" href="/shared/css/theme.css" />
    <link rel="stylesheet" href="/shared/css/components.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--void-900);
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }

      /* ponytail: kiosk full-bleed, no HUD grid from theme.css */
      body::before {
        display: none;
      }

      .layer {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 0;
        overflow: hidden;
        background: var(--void-900);
        pointer-events: none;
      }

      .layer.is-active {
        display: block;
        z-index: 1;
      }

      #layer-quiz.is-active {
        pointer-events: auto;
      }

      #layer-photo-img,
      #layer-video-el,
      #layer-video-mjpeg {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: var(--void-900);
      }

      #layer-video-mjpeg {
        position: absolute;
        inset: 0;
      }

      #layer-video-el[hidden],
      #layer-video-mjpeg[hidden] {
        display: none !important;
      }

      #layer-quiz {
        display: flex;
        flex-direction: column;
        padding: clamp(1rem, 3vw, 2rem);
        color: var(--text-primary);
      }

      .quiz-header {
        flex-shrink: 0;
        margin-bottom: var(--space-4);
      }

      .quiz-progress {
        margin: var(--space-2) 0 0;
        font-size: var(--text-lg);
        color: var(--text-muted);
      }

      #quiz-question {
        margin: 0 0 var(--space-4);
      }

      #quiz-answers {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        flex: 1;
        overflow-y: auto;
      }

      .quiz-answer {
        min-height: 60px;
        width: 100%;
        text-align: left;
        font-size: clamp(1.1rem, 2.8vw, 1.45rem);
      }

      .quiz-answer.is-correct {
        border-color: var(--success);
        background: color-mix(in srgb, var(--success) 22%, transparent);
        color: var(--text-bright);
      }

      .quiz-answer.is-wrong {
        border-color: var(--danger);
        background: color-mix(in srgb, var(--danger) 18%, transparent);
        color: var(--text-bright);
      }

      #quiz-play {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #quiz-next {
        margin-top: var(--space-4);
        align-self: stretch;
      }

      #quiz-next[hidden] {
        display: none !important;
      }

      #quiz-result {
        display: none;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: var(--space-4);
      }

      #quiz-result.is-visible {
        display: flex;
      }

      #quiz-play.is-hidden {
        display: none;
      }

      .quiz-result-title {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        color: var(--cyan-400);
      }

      .quiz-result-score {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        color: var(--text-bright);
      }

      #mqtt-status {
        position: fixed;
        right: var(--space-3);
        bottom: var(--space-2);
        z-index: 1000;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        opacity: 0.5;
        color: var(--text-muted);
        pointer-events: none;
      }

      #mqtt-status.is-connected {
        color: var(--cyan-400);
      }

      #mqtt-status.is-error {
        color: var(--danger);
      }
    </style>
    <script src="/shared/js/media-url.js"></script>
    <script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <script src="/shared/js/mqtt-client.js"></script>
  </head>
  <body>
    <section id="layer-photo" class="layer is-active" aria-hidden="false">
      <img id="layer-photo-img" src="/shared/assets/images/small-idle.svg" alt="Várakozás" />
    </section>

    <section id="layer-video" class="layer" aria-hidden="true">
      <video id="layer-video-el" autoplay playsinline muted></video>
      <img id="layer-video-mjpeg" alt="" hidden />
    </section>

    <section id="layer-quiz" class="layer" aria-hidden="true">
      <div id="quiz-play">
        <header class="quiz-header">
          <p class="hud-label">Nanoportal // kvíz</p>
          <p class="quiz-progress" id="quiz-progress">1 / 1</p>
        </header>
        <h2 id="quiz-question" class="text-hero">Várakozás kérdésekre…</h2>
        <div id="quiz-answers"></div>
        <button type="button" id="quiz-next" class="btn-neon btn-cta" hidden>Következő</button>
      </div>
      <div id="quiz-result" aria-live="polite">
        <h2 class="quiz-result-title">Eredmény</h2>
        <p class="quiz-result-score" id="quiz-result-score">0 / 0</p>
      </div>
    </section>

    <div id="mqtt-status" aria-live="polite">●</div>

    <script>
      (function () {
        const LAYERS = {
          photo: document.getElementById("layer-photo"),
          video: document.getElementById("layer-video"),
          quiz: document.getElementById("layer-quiz"),
        };
        const photoImg = document.getElementById("layer-photo-img");
        const videoEl = document.getElementById("layer-video-el");
        const mjpegEl = document.getElementById("layer-video-mjpeg");
        const quizPlay = document.getElementById("quiz-play");
        const quizResult = document.getElementById("quiz-result");
        const quizQuestion = document.getElementById("quiz-question");
        const quizAnswers = document.getElementById("quiz-answers");
        const quizProgress = document.getElementById("quiz-progress");
        const quizNext = document.getElementById("quiz-next");
        const quizResultScore = document.getElementById("quiz-result-score");
        const statusEl = document.getElementById("mqtt-status");

        const TOPICS = [
          "smallscreen/layer",
          "smallscreen/photo",
          "smallscreen/video",
          "smallscreen/quiz",
        ];

        let activeLayer = "photo";
        let mqttClient = null;
        let quizQuestions = [];
        let questionIndex = 0;
        let score = 0;
        let awaitingNext = false;

        const Mqtt = window.NanoportalMqtt;

        function setMqttStatus(state) {
          if (!statusEl) return;
          statusEl.classList.remove("is-connected", "is-error");
          if (state === "connected") statusEl.classList.add("is-connected");
          else if (state === "error") statusEl.classList.add("is-error");
        }

        function resolveImageSrc(raw) {
          const text = String(raw ?? "").trim();
          if (!text) return "";
          if (text.startsWith("data:")) return text;
          if (text.startsWith("http://") || text.startsWith("https://") || text.startsWith("/")) {
            return text;
          }
          return "data:image/jpeg;base64," + text;
        }

        function resolveVideoUrl(raw) {
          const t = String(raw ?? "").trim();
          if (!t) return "";
          if (/^https?:\/\//.test(t) || t.startsWith("/")) return t;
          return "/shared/assets/video/" + encodeURIComponent(t);
        }

        function parseQuizJson(raw) {
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            return [];
          }
          if (!Array.isArray(data)) return [];
          const out = [];
          for (const row of data) {
            if (!row || typeof row !== "object") continue;
            const question = String(row.question ?? "").trim();
            const answersRaw = Array.isArray(row.answers) ? row.answers : [];
            const answers = [];
            for (const a of answersRaw) {
              if (!a || typeof a !== "object") continue;
              const text = String(a.text ?? "").trim();
              if (!text) continue;
              answers.push({ text, correct: Boolean(a.correct) });
            }
            if (!question || answers.length < 2) continue;
            out.push({ question, answers });
          }
          return out;
        }

        function hideQuizNext() {
          awaitingNext = false;
          if (quizNext) quizNext.hidden = true;
        }

        function resetQuizState() {
          questionIndex = 0;
          score = 0;
          hideQuizNext();
          if (quizPlay) quizPlay.classList.remove("is-hidden");
          if (quizResult) quizResult.classList.remove("is-visible");
        }

        function showQuizResult() {
          const total = quizQuestions.length;
          hideQuizNext();
          if (quizPlay) quizPlay.classList.add("is-hidden");
          if (quizResult) quizResult.classList.add("is-visible");
          if (quizResultScore) {
            quizResultScore.textContent = score + " / " + total;
          }
          if (mqttClient && mqttClient.connected && Mqtt) {
            Mqtt.publish(
              mqttClient,
              "smallscreen/quiz/result",
              JSON.stringify({ score: score, total: total }),
              { retain: false },
            ).catch(function () {});
          }
        }

        function renderQuestion() {
          hideQuizNext();

          if (!quizQuestions.length) {
            if (quizQuestion) quizQuestion.textContent = "Nincs betöltött kérdés.";
            if (quizAnswers) quizAnswers.innerHTML = "";
            if (quizProgress) quizProgress.textContent = "0 / 0";
            return;
          }

          if (questionIndex >= quizQuestions.length) {
            showQuizResult();
            return;
          }

          const q = quizQuestions[questionIndex];
          if (quizQuestion) quizQuestion.textContent = q.question;
          if (quizProgress) {
            quizProgress.textContent = questionIndex + 1 + " / " + quizQuestions.length;
          }
          if (quizAnswers) {
            quizAnswers.innerHTML = "";
            q.answers.forEach(function (answer, idx) {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = "btn-neon quiz-answer";
              btn.textContent = answer.text;
              btn.dataset.index = String(idx);
              btn.addEventListener("click", function () {
                onAnswerTap(idx);
              });
              quizAnswers.appendChild(btn);
            });
          }
        }

        function onAnswerTap(answerIndex) {
          if (awaitingNext || activeLayer !== "quiz") return;
          if (!quizQuestions.length || questionIndex >= quizQuestions.length) return;

          const q = quizQuestions[questionIndex];
          const chosen = q.answers[answerIndex];
          if (!chosen) return;

          const buttons = quizAnswers ? quizAnswers.querySelectorAll(".quiz-answer") : [];

          if (!chosen.correct) {
            const btn = buttons[answerIndex];
            if (btn) btn.classList.add("is-wrong");
            return;
          }

          score += 1;
          buttons.forEach(function (btn, i) {
            btn.disabled = true;
            if (i === answerIndex) btn.classList.add("is-correct");
          });

          awaitingNext = true;
          if (quizNext) quizNext.hidden = false;
        }

        function onQuizNext() {
          if (!awaitingNext || activeLayer !== "quiz") return;
          questionIndex += 1;
          renderQuestion();
        }

        if (quizNext) {
          quizNext.addEventListener("click", onQuizNext);
        }

        function startQuiz() {
          resetQuizState();
          renderQuestion();
        }

        function isMjpegUrl(url) {
          return window.NanoportalMediaUrl && window.NanoportalMediaUrl.isMjpegUrl(url);
        }

        function resetVideo() {
          if (!videoEl) return;
          videoEl.pause();
          try {
            videoEl.currentTime = 0;
          } catch (_) {}
        }

        function playVideo() {
          if (mjpegEl && !mjpegEl.hidden) return;
          if (!videoEl || !videoEl.src) return;
          const p = videoEl.play();
          if (p && typeof p.catch === "function") {
            p.catch(function () {});
          }
        }

        function setPhotoSrc(raw) {
          const src = resolveImageSrc(raw);
          if (!photoImg) return;
          if (!src) {
            photoImg.src = "/shared/assets/images/small-idle.svg";
            photoImg.alt = "Várakozás";
            return;
          }
          photoImg.src = src;
          photoImg.alt = "Statikus kép";
        }

        function setVideoSrc(raw) {
          const src = resolveVideoUrl(raw);
          if (!src) {
            if (videoEl) {
              videoEl.pause();
              videoEl.removeAttribute("src");
              videoEl.hidden = false;
            }
            if (mjpegEl) {
              mjpegEl.hidden = true;
              mjpegEl.removeAttribute("src");
            }
            return;
          }
          const wasActive = activeLayer === "video";
          resetVideo();
          if (isMjpegUrl(src)) {
            if (videoEl) {
              videoEl.hidden = true;
              videoEl.removeAttribute("src");
            }
            if (mjpegEl) {
              mjpegEl.hidden = false;
              mjpegEl.src = src + (src.includes("?") ? "&" : "?") + "_t=" + Date.now();
            }
          } else {
            if (mjpegEl) {
              mjpegEl.hidden = true;
              mjpegEl.removeAttribute("src");
            }
            if (videoEl) {
              videoEl.hidden = false;
              videoEl.src = src;
              videoEl.load();
            }
            if (wasActive) playVideo();
          }
        }

        function setActiveLayer(name) {
          const next = String(name ?? "").trim().toLowerCase();
          if (next !== "photo" && next !== "video" && next !== "quiz") return;

          if (activeLayer === "video" && next !== "video") {
            resetVideo();
          }
          if (activeLayer === "quiz" && next !== "quiz") {
            hideQuizNext();
          }

          activeLayer = next;

          for (const key of Object.keys(LAYERS)) {
            const el = LAYERS[key];
            if (!el) continue;
            const on = key === next;
            el.classList.toggle("is-active", on);
            el.setAttribute("aria-hidden", on ? "false" : "true");
          }

          if (next === "video") playVideo();
          if (next === "quiz") startQuiz();
        }

        function handleTopic(topic, text) {
          text = String(text ?? "").trim();
          switch (topic) {
            case "smallscreen/layer":
              setActiveLayer(text);
              break;
            case "smallscreen/photo":
              setPhotoSrc(text);
              break;
            case "smallscreen/video":
              setVideoSrc(text);
              break;
            case "smallscreen/quiz":
              quizQuestions = parseQuizJson(text);
              if (activeLayer === "quiz") startQuiz();
              break;
            default:
              break;
          }
        }

        if (!Mqtt) {
          setMqttStatus("error");
        } else {
          mqttClient = Mqtt.connect({
            topics: TOPICS,
            onMessage: handleTopic,
            onStatus: function (state) {
              setMqttStatus(state === "connected" ? "connected" : state === "error" ? "error" : "");
            },
          });
        }
      })();
    </script>
  </body>
</html>
